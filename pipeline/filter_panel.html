<style>
/* Prevent expanded filters from inflating the top-left grid row, which
   pushes the colormap off-screen. Filter content overflows visually;
   the colormap (z-index:100) renders on top when they overlap. */
.stack.top-left {
  min-height: 0;
}
#filter-container {
  width: auto;
  max-width: calc(100vw - 48px);
  padding: 8px 10px !important;
}
#filter-container.open {
  width: 340px;
}
#filter-header {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  user-select: none;
  line-height: 1.4;
}
#filter-header:hover { color: var(--cyan); }
#filter-toggle-icon {
  font-size: 11px;
  transition: transform 0.2s;
}
#filter-body {
  display: none;
  margin-top: 10px;
  overflow-y: auto;
  overflow-x: hidden;
}
#filter-body.open { display: block; }
#filter-status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
#filter-match-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--text-dim);
  line-height: 1.4;
}
#filter-reset-inline {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--cyan);
  background: none;
  border: none;

  border-radius: 3px;
}

  text-decoration: underline;
}

  background: rgba(95, 179, 161, 0.10);
}
.filter-group {
  margin-bottom: 8px;
  padding-left: 6px;
  border-left: 2px solid transparent;
  transition: border-color 0.15s;
}
.filter-group-active {
  border-left-color: var(--brass);
}

}

}
.filter-range-value {

}
.filter-range-wrapper {
  position: relative;

  margin: 6px 0 2px;
}

  position: absolute;
  top: 9px;
  left: 0;

}

  background: var(--brass);
}
</style>

<script>
// Stub plausible() so the panel works whether or not analytics is loaded.
window.plausible = window.plausible || function() {};

(function() {
  const FILTER_CONFIG = __FILTER_CONFIG_JSON__;

  // URL-param shortname -> filter ID. Used for serializing filter state to ?query
  // params so users can share or bookmark a filtered view.
  const PARAM_KEY_MAP = {
    'rating': 'filter-content-rating',
    'sentiment': 'filter-sentiment',
    'genre': 'filter-primary-genre',
    'price': 'filter-price-tier',
    'fgenre': 'filter-facet-primary-genre',
    'fmp': 'filter-facet-multiplayer-mode',
    'fset': 'filter-facet-setting-aesthetic',
    'fpace': 'filter-facet-pacing-tone',
    'fscale': 'filter-facet-production-scale',
    'reviews': 'filter-reviews',
  };

  class FilterPanel {
    constructor(datamap, hoverData, config) {
      this.datamap = datamap;
      this.hoverData = hoverData;
      this.config = config;
      this.filters = {};
      this.totalCount = config.totalCount;
      this.colormapFieldToFilterId = config.colormapFieldToFilterId || {};
      this.filterIdToColormapField = config.filterIdToColormapField || {};
      this.patchedLegends = {};

      this.container = document.getElementById('filter-controls');
      this.matchCountEl = document.getElementById('filter-match-count');

      // Build all configured filters, grouped under section dividers.
      // The CONTENT section sits first because Content Rating defaults to a
      // non-permissive state (Adult unchecked) and is the most consequential
      // filter for "what shows on the map" out of the box.
      const sections = config.sections || [];
      for (const section of sections) {
        const divider = document.createElement('div');
        divider.className = 'filter-section-divider';
        divider.textContent = section.label;
        this.container.appendChild(divider);
        for (const f of section.filters) {
          if (f.type === 'range') {
            this.initRangeFilter(f.name, f.filterId, {
              label: f.label,
              field: f.field,
              min: f.min,
              max: f.max,
              sliderMax: f.sliderMax,
              step: f.step != null ? f.step : 1,
              compact: !!f.compact,
              capLabel: f.capLabel !== false, // default true
            });
          } else {
            this.initCheckboxFilter(f.name, f.filterId, {
              label: f.label,
              field: f.field,
              values: f.values,
              initialChecked: f.initialChecked,
              resetTo: f.resetTo,
              startCollapsed: f.startCollapsed !== false, // default true
            });
          }
        }
      }

      this.setupLegendSync();

      const header = document.getElementById('filter-header');
      const body = document.getElementById('filter-body');
      const icon = document.getElementById('filter-toggle-icon');
      header.addEventListener('click', () => {
        body.classList.toggle('open');
        document.getElementById('filter-container').classList.toggle('open');
        icon.innerHTML = body.classList.contains('open') ? '&#9662;' : '&#9656;';
        if (body.classList.contains('open')) {
          plausible('Filter Panel Opened');
          this.updateFilterBodyHeight();
        }
        this.serializeState();
      });

      window.addEventListener('resize', () => {
        if (body.classList.contains('open')) this.updateFilterBodyHeight();
      });

      document.getElementById('filter-reset-inline').addEventListener('click', () => this.resetAll());

      // Apply initial filter state. For checkbox filters with a non-permissive
      // initialChecked (e.g. Content Rating's Adult-hidden default), this is
      // what actually applies the selection out of the box. Range filters
      // start at full extent so their apply is a no-op but harmless.
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type === 'range') this.applyRangeFilter(filterId);
        else this._applyCheckboxFilter(filterId);
      }
      this._updateResetButtonState();
      this.updateMatchCount();
    }

    initCheckboxFilter(name, filterId, opts) {
      const { label, field, values, initialChecked, resetTo, startCollapsed } = opts;
      const group = document.createElement('div');
      group.className = 'filter-group';

      // Determine which boxes start checked. initialChecked is an explicit
      // allowlist; missing it means everything checked.
      const isInitiallyChecked = (val) => {
        if (!initialChecked) return true;
        return initialChecked.includes(val);
      };

      const allId = `${filterId}-select-all`;
      const noneId = `${filterId}-select-none`;
      const collapsedClass = startCollapsed ? ' collapsed' : '';
      const arrowCollapsed = startCollapsed ? ' collapsed' : '';
      const singleCol = values.length <= 4 ? ' filter-checkbox-list-single' : '';
      let html = `<div class="filter-group-label filter-group-label-collapsible"><span><span class="filter-subsection-arrow${arrowCollapsed}">&#9660;</span>${label}</span><span class="filter-group-actions"><a id="${allId}">All</a> / <a id="${noneId}">None</a></span></div><div class="filter-checkbox-list${singleCol}${collapsedClass}">`;
      for (const val of values) {
        const id = `${filterId}-${val.replace(/\s+/g, '-')}`;
        const checked = isInitiallyChecked(val) ? ' checked' : '';
        html += `<label class="filter-checkbox-item"><input type="checkbox" id="${id}" value="${val}"${checked}> ${val}</label>`;
      }
      html += '</div>';
      group.innerHTML = html;
      this.container.appendChild(group);

      const labelRow = group.querySelector('.filter-group-label');
      const checkboxList = group.querySelector('.filter-checkbox-list');
      const arrow = group.querySelector('.filter-subsection-arrow');
      labelRow.addEventListener('click', (e) => {
        if (e.target.closest('.filter-group-actions')) return;
        const isCollapsed = checkboxList.classList.toggle('collapsed');
        arrow.classList.toggle('collapsed', isCollapsed);
        this.serializeState();
      });

      const checkboxes = group.querySelectorAll('input[type="checkbox"]');
      const fieldValues = this.hoverData[field];

      // resetTo defaults to "all values" — a permissive reset. For Content Rating
      // we override resetTo so Reset returns to the safer initial state rather
      // than checking every value (which would un-hide adult content).
      this.filters[filterId] = {
        type: 'checkbox',
        checkboxes,
        fieldValues,
        values,
        group,
        name,
        resetTo: resetTo || values.slice(),
      };

      const onChange = () => {
        this._applyCheckboxFilter(filterId);
        this._updateResetButtonState();
      };
      checkboxes.forEach(cb => cb.addEventListener('change', onChange));

      document.getElementById(allId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = true; });
        onChange();
      });
      document.getElementById(noneId).addEventListener('click', () => {
        checkboxes.forEach(cb => { cb.checked = false; });
        onChange();
      });
    }

    // True when a filter is in its default state — used by the visual "active"
    // indicator, the global Reset button highlight, and serializeState's
    // "skip if default" logic.
    _isAtReset(f) {
      if (f.type === 'range') {
        return f.state.minVal <= f.min && f.state.maxVal >= f.sliderMax;
      }
      const target = new Set(f.resetTo);
      return Array.from(f.checkboxes).every(cb => cb.checked === target.has(cb.value));
    }

    initRangeFilter(name, filterId, opts) {
      const { label, field, min, max, sliderMax, step, compact, capLabel } = opts;

      const fmt = compact
        ? (v) => v >= 1e6 ? (v / 1e6).toFixed(1).replace(/\.0$/, '') + 'M'
                          : v >= 1e3 ? Math.round(v / 1e3) + 'K'
                                     : String(v)
        : (v) => v.toLocaleString();
      const fmtMaxLabel = (v) => (v >= sliderMax && capLabel && sliderMax < max) ? fmt(v) + '+' : fmt(v);

      const group = document.createElement('div');
      group.className = 'filter-group';
      group.innerHTML = `
        <div class="filter-group-label">
          <span>${label}</span>
          <span class="filter-range-value" id="${filterId}-value">${fmt(min)} – ${fmtMaxLabel(sliderMax)}</span>
        </div>
        <div class="filter-range-wrapper">
          <div class="filter-range-track"></div>
          <div class="filter-range-fill" id="${filterId}-fill"></div>
          <input type="range" id="${filterId}-min" min="${min}" max="${sliderMax}" value="${min}" step="${step}">
          <input type="range" id="${filterId}-max" min="${min}" max="${sliderMax}" value="${sliderMax}" step="${step}">
        </div>
      `;
      this.container.appendChild(group);

      const minInput = document.getElementById(`${filterId}-min`);
      const maxInput = document.getElementById(`${filterId}-max`);
      const fill = document.getElementById(`${filterId}-fill`);
      const valueLabel = document.getElementById(`${filterId}-value`);

      const values = this.hoverData[field].map(Number);
      const state = { minVal: min, maxVal: sliderMax };
      this.filters[filterId] = {
        type: 'range', state, minInput, maxInput, fill, valueLabel,
        min, sliderMax, max, field, values, group, name,
      };

      const updateFill = () => {
        const range = sliderMax - min;
        const leftPct = range === 0 ? 0 : ((state.minVal - min) / range) * 100;
        const rightPct = range === 0 ? 100 : ((state.maxVal - min) / range) * 100;
        fill.style.left = leftPct + '%';
        fill.style.width = (rightPct - leftPct) + '%';
      };

      const onInput = () => {
        let lo = parseInt(minInput.value);
        let hi = parseInt(maxInput.value);
        if (lo > hi) { [lo, hi] = [hi, lo]; }
        state.minVal = lo;
        state.maxVal = hi;
        valueLabel.textContent = `${fmt(lo)} – ${fmtMaxLabel(hi)}`;
        updateFill();
        this.applyRangeFilter(filterId);
        this._updateResetButtonState();
      };

      minInput.addEventListener('input', onInput);
      maxInput.addEventListener('input', onInput);
      updateFill();
    }

    applyRangeFilter(filterId) {
      const f = this.filters[filterId];
      const { state, max, sliderMax, values } = f;

      if (this._isAtReset(f)) {
        this.datamap.removeSelection(filterId);
      } else {
        // When the max handle sits at the slider cap, treat it as "no upper
        // bound" — include all values from sliderMax up to actual max. This is
        // the capped-tail UX that prevents a long tail from compressing the
        // useful range.
        const effectiveMax = state.maxVal >= sliderMax ? max : state.maxVal;
        const indices = [];
        for (let i = 0; i < values.length; i++) {
          if (values[i] >= state.minVal && values[i] <= effectiveMax) {
            indices.push(i);
          }
        }
        this.datamap.addSelection(indices, filterId);
      }
      f.group.classList.toggle('filter-group-active', !this._isAtReset(f));
      this.updateMatchCount();
      this.serializeState();
    }

    _applyCheckboxFilter(filterId) {
      const f = this.filters[filterId];
      if (!f || f.type !== 'checkbox') return;
      const checked = new Set();
      f.checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
      const allChecked = checked.size === f.values.length;

      if (allChecked) {
        this.datamap.removeSelection(filterId);
      } else {
        const indices = [];
        for (let i = 0; i < f.fieldValues.length; i++) {
          if (checked.has(f.fieldValues[i])) {
            indices.push(i);
          }
        }
        this.datamap.addSelection(indices, filterId);
      }
      f.group.classList.toggle('filter-group-active', !this._isAtReset(f));
      this.syncLegendOpacity(filterId);
      this.updateMatchCount();
      this.serializeState();
    }

    setupLegendSync() {
      const colorSelector = this.datamap.colorSelector;
      if (!colorSelector || !colorSelector.legends) return;

      for (const [field, filterId] of Object.entries(this.colormapFieldToFilterId)) {
        this.patchLegendContainer(field, filterId, colorSelector);
      }

      const origHandler = colorSelector.handleColorMapSelection.bind(colorSelector);
      const self = this;
      colorSelector.handleColorMapSelection = function(field) {
        origHandler(field);
        plausible('Colormap Change',{props:{colormap:field.description||field}});
        self.onColormapChanged(field);
        self.serializeState();
      };
    }

    patchLegendContainer(field, filterId, colorSelector) {
      const origContainer = colorSelector.legends[field];
      if (!origContainer) return;

      const newContainer = origContainer.cloneNode(true);
      origContainer.parentNode.replaceChild(newContainer, origContainer);
      colorSelector.legends[field] = newContainer;

      const items = newContainer.querySelectorAll('.legend-item');
      this.patchedLegends[field] = { container: newContainer, items };

      const self = this;
      newContainer.addEventListener('click', function(e) {
        const legendItem = e.target.closest('.legend-item');
        if (!legendItem) return;
        const labelEl = legendItem.querySelector('.legend-label');
        if (!labelEl) return;
        const category = labelEl.textContent.trim();

        const filter = self.filters[filterId];
        if (!filter || filter.type !== 'checkbox') return;

        let matchingCb = null;
        filter.checkboxes.forEach(cb => {
          if (cb.value === category) matchingCb = cb;
        });
        if (!matchingCb) return;

        // Replicate original legend behavior: solo on first click, toggle if
        // already filtered; if you'd uncheck the only remaining one, restore all.
        const allChecked = Array.from(filter.checkboxes).every(cb => cb.checked);
        if (allChecked) {
          filter.checkboxes.forEach(cb => { cb.checked = (cb.value === category); });
        } else {
          const checkedCbs = Array.from(filter.checkboxes).filter(cb => cb.checked);
          if (checkedCbs.length === 1 && checkedCbs[0].value === category) {
            filter.checkboxes.forEach(cb => { cb.checked = true; });
          } else {
            matchingCb.checked = !matchingCb.checked;
          }
        }
        matchingCb.dispatchEvent(new Event('change'));
      });

      this.syncLegendOpacity(filterId);
    }

    syncLegendOpacity(filterId) {
      const field = this.filterIdToColormapField[filterId];
      if (!field || !this.patchedLegends[field]) return;

      const filter = this.filters[filterId];
      if (!filter || filter.type !== 'checkbox') return;

      const checked = new Set();
      filter.checkboxes.forEach(cb => { if (cb.checked) checked.add(cb.value); });
      const allChecked = checked.size === filter.values.length;

      this.patchedLegends[field].items.forEach(item => {
        const labelEl = item.querySelector('.legend-label');
        if (!labelEl) return;
        const label = labelEl.textContent.trim();
        item.style.opacity = (allChecked || checked.has(label)) ? 1 : 0.25;
      });
    }

    onColormapChanged(field) {
      const filterId = this.colormapFieldToFilterId[field];
      if (filterId) this.syncLegendOpacity(filterId);
    }

    updateFilterBodyHeight() {
      const body = document.getElementById('filter-body');
      const colormap = document.getElementById('colormap-selector-container');
      if (!colormap) return;
      const bodyTop = body.getBoundingClientRect().top;
      const colormapTop = colormap.getBoundingClientRect().top;
      const available = colormapTop - bodyTop - 20;
      if (available > 0) body.style.maxHeight = available + 'px';
    }

    _updateResetButtonState() {
      const resetBtn = document.getElementById('filter-reset-inline');
      let anyDifferentFromReset = false;
      for (const [, f] of Object.entries(this.filters)) {
        if (!this._isAtReset(f)) {
          anyDifferentFromReset = true;
          break;
        }
      }
      resetBtn.classList.toggle('filter-reset-active', anyDifferentFromReset);
    }

    updateMatchCount() {
      const mgr = this.datamap.dataSelectionManager;
      const hasSelections = Object.keys(mgr.selectedIndicesByItem).length > 0;
      if (hasSelections) {
        const selected = mgr.getSelectedIndices();
        this.matchCountEl.textContent = `${selected.size.toLocaleString()} / ${this.totalCount.toLocaleString()} games`;
      } else {
        this.matchCountEl.textContent = `${this.totalCount.toLocaleString()} / ${this.totalCount.toLocaleString()} games`;
      }
    }

    serializeState() {
      const params = new URLSearchParams();

      const colorSelector = this.datamap.colorSelector;
      if (colorSelector && colorSelector.selectedColorMap) {
        const field = colorSelector.selectedColorMap.field;
        if (field && field !== 'none') params.set('cm', field);
      }

      // Filters: only serialize when the current state differs from the
      // filter's default. That keeps URLs clean for users who haven't touched
      // anything, even though Content Rating starts with Adult unchecked.
      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f) continue;
        if (this._isAtReset(f)) continue;

        if (f.type === 'range') {
          params.set(paramKey, `${f.state.minVal}-${f.state.maxVal}`);
          continue;
        }

        const checked = [];
        const unchecked = [];
        f.checkboxes.forEach(cb => {
          if (cb.checked) checked.push(cb.value);
          else unchecked.push(cb.value);
        });
        if (unchecked.length === 0) {
          params.set(paramKey, '*'); // sentinel for "all checked"
        } else if (unchecked.length < checked.length) {
          params.set(paramKey, unchecked.map(v => '!' + v).join(','));
        } else {
          params.set(paramKey, checked.join(','));
        }
      }

      const labelToggle = document.getElementById('label-toggle');
      if (labelToggle && !labelToggle.checked) params.set('labels', '0');

      const body = document.getElementById('filter-body');
      if (body.classList.contains('open')) params.set('panel', '1');

      const expandedSubs = [];
      for (const [, f] of Object.entries(this.filters)) {
        if (f.type !== 'checkbox' || !f.name) continue;
        const list = f.group.querySelector('.filter-checkbox-list');
        if (list && !list.classList.contains('collapsed')) expandedSubs.push(f.name);
      }
      if (expandedSubs.length > 0) params.set('expanded', expandedSubs.join(','));

      const qs = params.toString();
      history.replaceState(null, '', qs ? '?' + qs : location.pathname);
    }

    restoreFromURL() {
      const params = new URLSearchParams(location.search);
      if (params.size === 0) return;

      const cm = params.get('cm');
      if (cm) {
        const colorSelector = this.datamap.colorSelector;
        if (colorSelector && colorSelector.colorMaps) {
          const match = colorSelector.colorMaps.find(m => m.field === cm);
          if (match) colorSelector.handleColorMapSelection(match);
        }
      }

      for (const [paramKey, filterId] of Object.entries(PARAM_KEY_MAP)) {
        const f = this.filters[filterId];
        if (!f) continue;
        const val = params.get(paramKey);
        if (!val) continue;

        if (f.type === 'range') {
          const dash = val.indexOf('-', val.startsWith('-') ? 1 : 0);
          if (dash <= 0) continue;
          const lo = parseInt(val.slice(0, dash));
          const hi = parseInt(val.slice(dash + 1));
          if (isNaN(lo) || isNaN(hi)) continue;
          f.minInput.value = lo;
          f.maxInput.value = hi;
          f.minInput.dispatchEvent(new Event('input'));
          continue;
        }

        if (val === '*') {
          f.checkboxes.forEach(cb => { cb.checked = true; });
        } else {
          const items = val.split(',');
          const isExclusion = items.length > 0 && items[0].startsWith('!');
          if (isExclusion) {
            const excluded = new Set(items.map(v => v.slice(1)));
            f.checkboxes.forEach(cb => { cb.checked = !excluded.has(cb.value); });
          } else {
            const included = new Set(items);
            f.checkboxes.forEach(cb => { cb.checked = included.has(cb.value); });
          }
        }
        if (f.checkboxes.length > 0) {
          f.checkboxes[0].dispatchEvent(new Event('change'));
        }
      }

      if (params.get('labels') === '0') {
        const labelToggle = document.getElementById('label-toggle');
        if (labelToggle) {
          labelToggle.checked = false;
          labelToggle.dispatchEvent(new Event('change'));
        }
      }

      const expanded = params.get('expanded');
      if (expanded) {
        const expandedNames = new Set(expanded.split(','));
        for (const [, f] of Object.entries(this.filters)) {
          if (f.type !== 'checkbox' || !f.name) continue;
          if (expandedNames.has(f.name)) {
            const list = f.group.querySelector('.filter-checkbox-list');
            const arrow = f.group.querySelector('.filter-subsection-arrow');
            if (list) list.classList.remove('collapsed');
            if (arrow) arrow.classList.remove('collapsed');
          }
        }
      }

      if (params.get('panel') === '1') {
        const body = document.getElementById('filter-body');
        const container = document.getElementById('filter-container');
        const icon = document.getElementById('filter-toggle-icon');
        body.classList.add('open');
        container.classList.add('open');
        icon.innerHTML = '&#9662;';
        this.updateFilterBodyHeight();
      }
    }

    resetAll() {
      plausible('Filter Reset');
      for (const [filterId, f] of Object.entries(this.filters)) {
        if (f.type === 'range') {
          f.minInput.value = f.min;
          f.maxInput.value = f.sliderMax;
          f.state.minVal = f.min;
          f.state.maxVal = f.sliderMax;
          f.group.classList.remove('filter-group-active');
          f.minInput.dispatchEvent(new Event('input'));
          continue;
        }
        const target = new Set(f.resetTo);
        f.checkboxes.forEach(cb => { cb.checked = target.has(cb.value); });
        f.group.classList.remove('filter-group-active');
        this._applyCheckboxFilter(filterId);
      }
      document.getElementById('filter-reset-inline').classList.remove('filter-reset-active');
      for (const legend of Object.values(this.patchedLegends)) {
        legend.items.forEach(item => { item.style.opacity = 1; });
      }
      this.updateMatchCount();

      const labelToggle = document.getElementById('label-toggle');
      if (labelToggle && labelToggle.checked !== true) {
        labelToggle.checked = true;
        labelToggle.dispatchEvent(new Event('change'));
      }

      this.serializeState();
    }
  }

  // Preserve original point radius on highlight clones, and force a dim-everything
  // re-render when filters are active but match nothing (DataMapPlot otherwise
  // treats empty selection as "no filter" and shows everything).
  function patchHighlightPoints(datamap) {
    var origHighlight = datamap.highlightPoints.bind(datamap);
    datamap.highlightPoints = function(itemId) {
      var currentLayer = datamap.pointLayer;
      var realClone = currentLayer.clone.bind(currentLayer);
      currentLayer.clone = function(overrides) {
        overrides.radiusMinPixels = datamap.pointRadiusMinPixels;
        overrides.radiusMaxPixels = datamap.pointRadiusMaxPixels;
        return realClone(overrides);
      };
      origHighlight(itemId);
      currentLayer.clone = realClone;

      var mgr = datamap.dataSelectionManager;
      var hasActiveFilters = Object.keys(mgr.selectedIndicesByItem).length > 0;
      var selectedIndices = mgr.getSelectedIndices();

      if (hasActiveFilters && selectedIndices.size === 0) {
        datamap.selected.fill(-1.0);
        var idx = datamap.layers.indexOf(datamap.pointLayer);
        if (idx !== -1) {
          var corrected = datamap.pointLayer.clone({
            radiusMinPixels: datamap.pointRadiusMinPixels,
            radiusMaxPixels: datamap.pointRadiusMaxPixels,
          });
          datamap.layers[idx] = corrected;
          datamap.pointLayer = corrected;
          datamap.deckgl.setProps({ layers: [...datamap.layers] });
        }
      }
    };
  }

  function setupLabelToggle(datamap, filterPanel) {
    const toggle = document.getElementById('label-toggle');
    if (!toggle) return;
    let labelData = null;

    function setLabelVisible(visible) {
      if (!datamap.labelLayer) return;
      if (!labelData) labelData = datamap.labelLayer.props.data;
      const idx = datamap.layers.indexOf(datamap.labelLayer);
      if (idx === -1) return;
      const replacement = new deck.TextLayer({
        id: 'labelLayer',
        data: labelData,
        pickable: datamap.labelLayer.props.pickable,
        getPosition: d => [d.x, d.y],
        getText: d => d.label,
        getColor: datamap.labelTextColor,
        getSize: d => d.size,
        sizeScale: 1,
        sizeMinPixels: datamap.textMinPixelSize,
        sizeMaxPixels: datamap.textMaxPixelSize,
        outlineWidth: datamap.textOutlineWidth,
        outlineColor: datamap.textOutlineColor,
        getBackgroundColor: datamap.textBackgroundColor,
        getBackgroundPadding: [15, 15, 15, 15],
        background: true,
        characterSet: datamap.labelLayer.props.characterSet,
        fontFamily: datamap.fontFamily,
        fontWeight: datamap.fontWeight,
        lineHeight: 0.95,
        fontSettings: { sdf: true },
        getTextAnchor: 'middle',
        getAlignmentBaseline: 'center',
        elevation: 100,
        collisionEnabled: true,
        getCollisionPriority: d => d.size,
        collisionTestProps: {
          sizeScale: datamap.textCollisionSizeScale,
          sizeMaxPixels: datamap.textMaxPixelSize * 2,
          sizeMinPixels: datamap.textMinPixelSize * 2,
        },
        extensions: [new deck.CollisionFilterExtension()],
        parameters: { depthTest: false },
        visible,
      });
      datamap.layers[idx] = replacement;
      datamap.labelLayer = replacement;
      datamap.deckgl.setProps({ layers: [...datamap.layers] });
    }

    toggle.addEventListener('change', () => {
      plausible('Toggle Region Labels');
      setLabelVisible(toggle.checked);
      if (filterPanel) filterPanel.serializeState();
    });
  }

  window.addEventListener('datamapReady', function(e) {
    const { datamap, hoverData } = e.detail;
    patchHighlightPoints(datamap);
    const filterPanel = new FilterPanel(datamap, hoverData, FILTER_CONFIG);
    setupLabelToggle(datamap, filterPanel);
    filterPanel.restoreFromURL();
  });
})();
</script>
